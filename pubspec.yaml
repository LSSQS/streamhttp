name: network_proxy
description: Network proxy
publish_to: 'none'

version: 1.2.0+1

environment:
  sdk: '>=3.0.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  crypto: ^3.0.3
  cupertino_icons: ^1.0.2
  basic_utils: ^5.7.0
  logger: ^2.0.1
  date_format: ^2.0.7
  window_manager: ^0.3.8

  desktop_multi_window:
    git:
      url: https://github.com/MixinNetwork/flutter-plugins.git
      path: packages/desktop_multi_window

  path_provider: ^2.1.2
  url_launcher: ^6.2.4
  proxy_manager: ^0.0.3
  qr_flutter: ^4.1.0
  easy_permission: ^1.0.0
  flutter_barcode_scanner: ^2.0.0
  flutter_toastr: ^1.0.3
  share_plus: ^8.0.2
  brotli: ^0.6.0
  file_selector: ^1.0.2

  # ✅ 修复 FFI 崩溃的最终版
  flutter_js:
    git:
      url: https://github.com/731096909/flutter_js.git
      ref: main

  flutter_code_editor:
  file_picker: ^8.0.0
  flutter_desktop_context_menu: ^0.2.0
  win32audio: ^1.3.1
  http: ^1.2.1
  provider: ^6.1.2

  image_picker: ^1.1.0
  crypton: ^2.2.1
  sizer: ^2.0.15

  curved_navigation_bar: ^1.0.3
  bubble_bottom_bar: ^2.0.0
  web_socket_channel: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/certs/ca.crt
    - assets/certs/ca_private.der
    - assets/icon.png