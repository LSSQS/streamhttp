workflows:
  build-ios-unsigned-ipa:
    name: Build Unsigned iOS IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.13.0  # 👈 这里固定旧版，解决 flutter_js 崩溃
      xcode: 15.0
      cocoapods: default
    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install --repo-update && cd ..

      - name: Clean & Build iOS (no-codesign)
        script: flutter build ios --release --no-codesign --verbose

      - name: Create Payload & Package IPA
        script: |
          mkdir -p Payload
          cp -R build/ios/Release-iphoneos/Runner.app Payload/
          zip -r build/ios/app-unsigned.ipa Payload
          rm -rf Payload

    artifacts:
      - build/ios/app-unsigned.ipa