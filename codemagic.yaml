workflows:
  build-ios-ipa:
    name: streamhttp iOS IPA Build
    max_build_duration: 120
    environment:
      flutter: 3.16.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Execute build_ios.sh and build IPA
        script: |
          #!/bin/bash
          set -e
          export TERM=xterm-256color
          chmod +x build_ios.sh
          ./build_ios.sh
    artifacts:
      # 直接收集生成的 IPA 文件
      - /tmp/build_output/*.ipa