workflows:
  ios-build:
    name: Build iOS IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: 15.4
      cocoapods: 1.15.2
      vars:
        BUNDLE_ID: "com.yourcompany.yourapp" # 替换成你的 Bundle ID
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get

      - name: Manually generate l10n (fix AppLocalizations error)
        script: |
          flutter gen-l10n --arb-dir=lib/l10n --template-arb-file=app_en.arb --output-localization-file=app_localizations.dart

      - name: Install iOS pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa