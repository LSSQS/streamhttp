workflows:
  build-ios-unsigned-ipa:
    name: Build Unsigned iOS IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Build unsigned iOS Release
        script: |
          flutter build ios --release --no-codesign
      - name: Package into unsigned IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/Release-iphoneos/Runner.app Payload/
          zip -r build/ios/streamhttp-unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ios/streamhttp-unsigned.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com