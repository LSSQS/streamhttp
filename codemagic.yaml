workflows:
  ios-build:
    name: Build iOS IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: 15.4
      cocoapods: 1.15.2
      vars:
        BUNDLE_ID: "com.yourcompany.yourapp"  # 👈 这里改成你自己的 Bundle ID
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Generate l10n 国际化（修复 AppLocalizations 报错）
        script: |
          flutter gen-l10n

      - name: Install iOS pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa