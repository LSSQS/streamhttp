workflows:
  build-ios:
    name: Build iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: 3.16.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: 生成国际化文件（让它闭嘴）
        script: flutter gen-l10n

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: 打包 IPA
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa