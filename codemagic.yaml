workflows:
  build-ios:
    name: Build iOS
    instance_type: mac_mini_m1
    environment:
      flutter: 3.10.6
      xcode: 14.3
    scripts:
      - flutter pub get
      - cd ios && pod install && cd ..
      - flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app