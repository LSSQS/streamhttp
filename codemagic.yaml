workflows:
  ios-build:
    name: Build iOS IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: 15.4
      cocoapods: 1.15.2
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Generate l10n
        script: flutter gen-l10n

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa